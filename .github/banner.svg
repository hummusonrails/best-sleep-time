<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1C"/>
      <stop offset="50%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1E1E1C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFEEC8"/>
      <stop offset="50%" stop-color="#FFD580"/>
      <stop offset="100%" stop-color="#FFEEC8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEEC8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFEEC8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#FFEEC8" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Top glow -->
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Corner brackets (matching the app's design) -->
  <g stroke="#FFEEC8" stroke-width="1.5" fill="none" opacity="0.2">
    <polyline points="40,60 40,35 65,35"/>
    <polyline points="1215,35 1240,35 1240,60"/>
    <polyline points="1240,260 1240,285 1215,285"/>
    <polyline points="65,285 40,285 40,260"/>
  </g>

  <!-- Title -->
  <text x="640" y="115" text-anchor="middle"
        font-family="Georgia, 'Cormorant Garamond', serif"
        font-size="52" font-weight="600" font-style="italic" fill="#FFEEC8">
    Best Sleep Time
  </text>

  <!-- Hebrew subtitle -->
  <text x="640" y="160" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#FFD580" opacity="0.8">
    הזמן הטוב לשינה
  </text>

  <!-- Tagline -->
  <text x="640" y="195" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400" fill="#FFEEC8" opacity="0.45">
    Real-time rocket alert analysis for daily safety decisions
  </text>

  <!-- Tech pills -->
  <g transform="translate(640, 245)" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
     font-size="12" font-weight="500">

    <!-- Next.js -->
    <rect x="-270" y="-14" width="80" height="28" rx="14" fill="#FFEEC8" fill-opacity="0.08" stroke="#FFEEC8" stroke-opacity="0.2" stroke-width="0.75"/>
    <text x="-230" y="4" fill="#FFEEC8" opacity="0.75">Next.js</text>

    <!-- TypeScript -->
    <rect x="-170" y="-14" width="100" height="28" rx="14" fill="#FFEEC8" fill-opacity="0.08" stroke="#FFEEC8" stroke-opacity="0.2" stroke-width="0.75"/>
    <text x="-120" y="4" fill="#FFEEC8" opacity="0.75">TypeScript</text>

    <!-- Tailwind -->
    <rect x="-50" y="-14" width="90" height="28" rx="14" fill="#FFEEC8" fill-opacity="0.08" stroke="#FFEEC8" stroke-opacity="0.2" stroke-width="0.75"/>
    <text x="-5" y="4" fill="#FFEEC8" opacity="0.75">Tailwind</text>

    <!-- Recharts -->
    <rect x="60" y="-14" width="90" height="28" rx="14" fill="#FFEEC8" fill-opacity="0.08" stroke="#FFEEC8" stroke-opacity="0.2" stroke-width="0.75"/>
    <text x="105" y="4" fill="#FFEEC8" opacity="0.75">Recharts</text>

    <!-- Vercel -->
    <rect x="170" y="-14" width="75" height="28" rx="14" fill="#FFEEC8" fill-opacity="0.08" stroke="#FFEEC8" stroke-opacity="0.2" stroke-width="0.75"/>
    <text x="207" y="4" fill="#FFEEC8" opacity="0.75">Vercel</text>
  </g>
</svg>
